schema_version: 1
name: nxboot_style_update
skip_self_test: true
description: >
  Standalone nxboot-style three-partition bootloader (correct implementation).
  Loads a confirmed primary image plus a newer external-magic update image and
  expects the update to copy into the primary slot.
platform: platforms/cortex_m0_nvm.repl
bootloader:
  elf: examples/nxboot_style/bootloader_nxboot_none.elf
  entry: 0x10000000
memory:
  sram: { start: 0x20000000, end: 0x20020000 }
  write_granularity: 4
  slots:
    exec: { base: 0x10002000, size: 0x23000 }
    staging: { base: 0x10025000, size: 0x23000 }
images:
  exec: examples/nxboot_style/nxboot_primary.bin
  staging: examples/nxboot_style/nxboot_update.bin
success_criteria:
  vtor_in_slot: exec
  vector_table_offset: 0x200
  image_hash: true
  image_hash_slot: exec
  expected_image: staging
fault_sweep:
  mode: runtime
  run_duration: "0.5"
  max_writes: 2048
expect:
  should_find_issues: false

schema_version: 1
name: esp_idf_ota_upgrade_confirm_hook
skip_self_test: true
description: >
  ESP-IDF OTA upgrade scenario with a boot_cycle_hook that simulates the app
  confirming the new image after the first successful boot. This is the first
  real hook consumer for confirm-or-rollback behavior.

platform: platforms/cortex_m4_flash_fast.repl
flash_backend: faultFlash
bootloader:
  elf: examples/esp_idf_ota/esp_idf_ota.elf
  entry: 0x00000000
memory:
  sram: { start: 0x20000000, end: 0x20040000 }
  write_granularity: 4
  slots:
    exec: { base: 0x0000C000, size: 0x74000 }
    staging: { base: 0x00080000, size: 0x74000 }
images:
  exec: examples/esp_idf_ota/slot0.bin
  staging: examples/esp_idf_ota/slot1.bin
pre_boot_state:
  - { address: 0x000F8000, u32: 0x00000001 }
  - { address: 0x000F8018, u32: 0x00000002 }
  - { address: 0x000F801C, u32: 0x4743989A }
  - { address: 0x000F9000, u32: 0x00000002 }
  - { address: 0x000F9018, u32: 0x00000000 }
  - { address: 0x000F901C, u32: 0x55F63774 }
success_criteria:
  vtor_in_slot: staging
  marker_address: 0x000FC000
  marker_value: 0x00000001
fault_sweep:
  mode: runtime
  evaluation_mode: execute
  max_writes: auto
  run_duration: "2.0"
  max_step_limit: 20000000
  fault_types: [power_loss]
  boot_cycles: 2
  boot_cycle_hook: examples/esp_idf_ota/hooks/confirm_pending_verify.py
expect:
  should_find_issues: false

schema_version: 1
name: fault_no_fallback
description: >-
  Vulnerable copy-in-place OTA with no fallback slot. The firmware copies
  staging directly over the active image at 0x10000000. A power loss during
  the copy corrupts the only runnable image, bricking the device. Expects
  the audit to detect a high brick rate.

platform: platforms/cortex_m0_nvm.repl
flash_backend: nvm_ctrl
bootloader:
  elf: examples/vulnerable_ota/firmware.elf
  entry: 0x10000000

memory:
  sram: { start: 0x20000000, end: 0x20020000 }
  write_granularity: 8
  slots:
    exec:    { base: 0x10000000, size: 0x38000 }
    staging: { base: 0x10038000, size: 0x38000 }

images:
  staging: examples/vulnerable_ota/firmware.bin


success_criteria:
  vtor_in_slot: exec

fault_sweep:
  mode: runtime
  max_writes: 28672
  max_writes_cap: 100000
  run_duration: "0.01"

expect:
  should_find_issues: true

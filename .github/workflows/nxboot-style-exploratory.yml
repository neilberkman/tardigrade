name: nxboot-style-exploratory

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Scenario YAML to run
        required: true
        default: scenarios/nxboot_style_exploratory.yaml

concurrency:
  group: nxboot-style-exploratory-${{ github.event.inputs.scenario }}
  cancel-in-progress: true

jobs:
  exploratory:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      TOOLCHAIN_VERSION: 13.2.1-1.1
      TOOLCHAIN_URL: https://github.com/xpack-dev-tools/arm-none-eabi-gcc-xpack/releases/download/v13.2.1-1.1/xpack-arm-none-eabi-gcc-13.2.1-1.1-linux-x64.tar.gz
      TOOLCHAIN_SHA256: 1252a8cafe9237de27a765376697230368eec21db44dc3f1edeb8d838dabd530
      RENODE_URL: https://builds.renode.io/renode-latest.linux-portable.tar.gz
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Arm GNU toolchain
        run: |
          set -euxo pipefail
          tarball="${RUNNER_TEMP}/arm-toolchain.tar.gz"
          curl -L "${TOOLCHAIN_URL}" -o "${tarball}"
          echo "${TOOLCHAIN_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "${tarball}" -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/xpack-arm-none-eabi-gcc-${TOOLCHAIN_VERSION}/bin" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/xpack-arm-none-eabi-gcc-${TOOLCHAIN_VERSION}/bin/arm-none-eabi-gcc" --version

      - name: Build nxboot-style example assets
        run: |
          set -euxo pipefail
          make -C examples/nxboot_style
          python3 examples/nxboot_style/gen_nxboot_images.py --output-dir examples/nxboot_style

      - name: Install Renode portable
        run: |
          set -euxo pipefail
          tarball="${RUNNER_TEMP}/renode-portable.tar.gz"
          curl -L "${RENODE_URL}" -o "${tarball}"
          mkdir -p "${RUNNER_TEMP}/renode"
          tar -xzf "${tarball}" -C "${RUNNER_TEMP}/renode" --strip-components=1
          python3 -m pip install --user -r "${RUNNER_TEMP}/renode/tests/requirements.txt"
          echo "${RUNNER_TEMP}/renode" >> "${GITHUB_PATH}"

      - name: Install Python dependencies
        run: python3 -m pip install --user pyyaml

      - name: Run exploratory scenario
        run: |
          python3 scripts/run_scenario.py \
            --scenario "${{ inputs.scenario }}" \
            --renode-test "${RUNNER_TEMP}/renode/renode-test" \
            --workers 2 \
            --output results/nxboot_style_exploratory.json

      - name: Print summary
        if: always()
        run: |
          if [ -f results/nxboot_style_exploratory.json ]; then
            python3 - <<'PY'
          import json
          import os
          payload = json.load(open("results/nxboot_style_exploratory.json"))
          total_issues = 0
          total_bricks = 0
          lines = []
          print("Scenario:", payload.get("scenario", {}).get("name"))
          print("Status:", payload.get("status"))
          for step_id, step in sorted(payload.get("steps", {}).items()):
              if step.get("kind") in ("audit", "replay"):
                  report = step.get("report") or {}
                  summary = report.get("summary", {}).get("runtime_sweep", {})
                  control = summary.get("control", {})
                  issues = int(summary.get("issue_points") or 0)
                  bricks = int(summary.get("bricks") or 0)
                  total_issues += issues
                  total_bricks += bricks
                  print("---", step_id)
                  print("  Verdict:", report.get("verdict"))
                  print("  Points:", summary.get("total_fault_points"))
                  print("  Issues:", issues)
                  print("  Bricks:", bricks)
                  print("  Control outcome:", control.get("boot_outcome"))
                  mba = control.get("multi_boot_analysis") or {}
                  if mba:
                      print("  Multi-boot:", mba.get("status"), mba.get("final_slot"))
                  lines.append(f"- `{step_id}`: issues={issues}, bricks={bricks}, verdict={report.get('verdict')}")
              else:
                  print("---", step_id)
                  print("  Status:", step.get("status"))
                  failures = step.get("failures") or []
                  if failures:
                      print("  Failures:")
                      for failure in failures:
                          print("   -", failure)
          if total_issues or total_bricks:
              print(f"::warning::Exploratory nxboot-style scenario found {total_issues} issue points and {total_bricks} bricks.")
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a") as fh:
                  fh.write("## nxboot-style exploratory summary\n")
                  fh.write(f"- Scenario: `{payload.get('scenario', {}).get('name')}`\n")
                  fh.write(f"- Status: `{payload.get('status')}`\n")
                  fh.write(f"- Total issues: `{total_issues}`\n")
                  fh.write(f"- Total bricks: `{total_bricks}`\n")
                  if lines:
                      fh.write("\n".join(lines) + "\n")
          PY
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nxboot-style-exploratory-results
          path: results/nxboot_style_exploratory.json
